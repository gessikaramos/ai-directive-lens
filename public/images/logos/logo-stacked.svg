<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180">
  <defs>
    <style>
      .logo-text {
        fill: #fff;
        font-family: Inter, sans-serif;
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .logo-shape {
        fill: none;
        stroke: #fff;
        stroke-width: 3.5;
      }
      .logo-dot {
        fill: #fff;
      }
    </style>
  </defs>
  <!-- Circle drawing -->
  <circle class="logo-shape" cx="70" cy="42" r="28"/>
  <!-- Small dot above circle -->
  <circle class="logo-dot" cx="70" cy="8" r="4"/>
  <!-- Text -->
  <text class="logo-text" x="70" y="110" text-anchor="middle" font-size="42">Lola</text>
  <text class="logo-text" x="60" y="148" text-anchor="middle" font-size="36">Lab</text>
  <!-- Period dot -->
  <circle class="logo-dot" cx="100" cy="142" r="5"/>
</svg>